
<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Feed</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <style>
    .article-img {
      display: block;
      max-width: 100%;
      margin-top: 0.75rem;
      border-radius: 4px;
    }

    .article-description {
      margin-top: 0.75rem;
    }

    .article-description :is(a, code, em) {
      word-break: break-word;
    }
  </style>
</head>

<body>
  <div class="container my-6 content">
    <div class="level mb-4">
      <div class="level-left">
        <div>
          <h1 class="title is-4 mb-1">Weekly Feed</h1>
          <p class="subtitle is-6 has-text-grey" id="meta"></p>
        </div>
      </div>
      <div class="level-right">
        <button id="copyBtn" class="button is-primary" disabled>复制 JSON</button>
      </div>
    </div>

    <span id="status" class="tag is-hidden mb-4"></span>
    <div id="articleList"></div>
    <p id="loading" class="has-text-grey">loading...</p>
  </div>

  <script>
    const articleList = document.getElementById('articleList')
    const copyBtn = document.getElementById('copyBtn')
    const statusEl = document.getElementById('status')
    const metaEl = document.getElementById('meta')
    const loadingEl = document.getElementById('loading')

    let feedData = null

    function showStatus(text, type = 'is-success') {
      statusEl.textContent = text
      statusEl.className = `tag mb-4 ${type}`
      clearTimeout(showStatus.timer)
      showStatus.timer = setTimeout(() => {
        statusEl.className = 'tag is-hidden mb-4'
      }, 2000)
    }

    function copyText(text) {
      if (navigator.clipboard?.writeText) {
        return navigator.clipboard.writeText(text).then(() => true).catch(() => false)
      }
      return Promise.resolve(false)
    }

    function copyTextFallback(text) {
      const textarea = document.createElement('textarea')
      textarea.value = text
      textarea.setAttribute('readonly', '')
      textarea.style.position = 'fixed'
      textarea.style.opacity = '0'
      document.body.appendChild(textarea)
      textarea.select()
      textarea.setSelectionRange(0, text.length)
      let ok = false
      try {
        ok = document.execCommand('copy')
      } catch {}
      document.body.removeChild(textarea)
      return ok
    }

    async function copyJson() {
      if (!feedData) return

      const text = JSON.stringify(feedData, null, 2)
      const copied = await copyText(text) || copyTextFallback(text)

      if (copied) {
        showStatus('已复制到剪贴板')
      } else {
        showStatus('复制失败，请手动选择复制', 'is-danger')
      }
    }

    function renderArticle(article) {
      const title = article.title || article.description?.replace(/<[^>]+>/g, '').slice(0, 80) || 'Untitled'
      const category = article.category || ''
      const author = article.author || ''
      const source = article.source || ''
      const link = article.link || ''
      const description = article.description || ''
      const img = article.img ? `<img class="article-img" src="${escapeAttr(article.img)}" alt="">` : ''

      return `
        <article class="box mb-4">
          <div class="mb-2">
            ${category ? `<span class="tag is-link is-light mr-2">${category}</span>` : ''}
            <strong>${escapeHtml(title)}</strong>
            ${link ? `<a class="is-size-7 ml-2" href="${escapeAttr(link)}" target="_blank" rel="noopener">阅读原文</a>` : ''}
            ${source ? `<span class="tag is-light ml-2">${escapeHtml(source)}</span>` : ''}
            ${author ? `<span class="tag is-light ml-1">${escapeHtml(author.trim())}</span>` : ''}
          </div>
          ${img}
          ${description ? `<div class="article-description">${description}</div>` : ''}
        </article>
      `
    }

    function renderArticles(articles) {
      const mid = Math.ceil(articles.length / 2)
      const left = articles.slice(0, mid)
      const right = articles.slice(mid)

      articleList.innerHTML = `
        <div class="columns">
          <div class="column">${left.map(renderArticle).join('')}</div>
          <div class="column">${right.map(renderArticle).join('')}</div>
        </div>
      `
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
    }

    function escapeAttr(text) {
      return escapeHtml(text).replace(/'/g, '&#39;')
    }

    fetch('./weeklyFeed.json')
      .then(response => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`)
        return response.json()
      })
      .then(data => {
        feedData = data
        loadingEl.remove()
        metaEl.textContent = `${data.articles?.length ?? 0} 篇文章`
        renderArticles(data.articles || [])
        copyBtn.disabled = false
      })
      .catch(err => {
        loadingEl.textContent = `加载失败: ${err.message}`
      })

    copyBtn.addEventListener('click', copyJson)
  </script>
</body>

</html>
